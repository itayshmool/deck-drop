<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeckDrop Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1040px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #deff9a;
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Urbanist', sans-serif;
      font-size: 28px;
      font-weight: 600;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .admin-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #64748b;
    }
    .admin-photo {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    .nav-right a {
      color: #64748b;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .nav-right a:hover { color: #deff9a; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #64748b;
    }
    .empty h2 {
      font-family: 'Urbanist', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: #141414;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #334155; }
    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #deff9a;
    }
    .card-meta {
      font-size: 13px;
      color: #64748b;
    }
    button {
      background: #1e293b;
      color: #deff9a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #334155; }
    .btn-danger {
      color: #f87171;
      border-color: transparent;
      background: transparent;
      padding: 4px 10px;
      font-size: 12px;
    }
    .btn-danger:hover { background: #1e293b; }

    /* Modal overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #141414;
      border: 1px solid #1e293b;
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .modal-header h2 {
      font-family: 'Urbanist', sans-serif;
      font-size: 20px;
      font-weight: 600;
    }
    .modal-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .modal-close:hover { color: #e2e8f0; background: none; }

    /* Form elements */
    .section {
      margin-bottom: 24px;
    }
    .section h3 {
      font-family: 'Urbanist', sans-serif;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
      color: #cbd5e1;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    input[type="email"], input[type="text"] {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #deff9a; }
    textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #deff9a; }
    .hint {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 8px;
    }

    /* User list */
    .user-list { list-style: none; }
    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }
    .user-item:last-child { border-bottom: none; }
    .user-email { color: #cbd5e1; }
    .count { color: #64748b; font-size: 13px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #141414;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      color: #deff9a;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <div class="label">DeckDrop</div>
        <h1>Admin Dashboard</h1>
      </div>
      <div class="nav-right">
        <span class="admin-info" id="adminInfo"></span>
        <a href="/admin/logout">Sign Out</a>
      </div>
    </div>
    <div id="content"></div>
  </div>

  <!-- User management modal -->
  <div class="overlay" id="userOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>

      <div class="section">
        <h3>Add User</h3>
        <div class="input-row">
          <input type="email" id="singleEmail" placeholder="user@gmail.com" onkeydown="if(event.key==='Enter')addSingle()">
          <button onclick="addSingle()">Add</button>
        </div>
      </div>

      <div class="section">
        <h3>Bulk Add</h3>
        <p class="hint">One email per line, or comma-separated.</p>
        <textarea id="bulkEmails" placeholder="user1@gmail.com&#10;user2@gmail.com&#10;user3@gmail.com"></textarea>
        <div style="margin-top: 12px;">
          <button onclick="addBulk()">Add All</button>
        </div>
      </div>

      <div class="section" style="margin-bottom: 0;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <h3 style="margin-bottom: 0;">Users</h3>
          <span class="count" id="modalUserCount"></span>
        </div>
        <ul class="user-list" id="modalUserList"></ul>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let activeDeck = null;

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    async function api(method, path, body) {
      const opts = { method, headers: {} };
      if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(path, opts);
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // --- Init ---
    async function init() {
      try {
        const me = await api('GET', '/admin/api/me');
        const info = document.getElementById('adminInfo');
        if (me.photo) {
          info.innerHTML = `<img class="admin-photo" src="${escapeHtml(me.photo)}" alt=""> ${escapeHtml(me.name || me.email)}`;
        } else {
          info.textContent = me.name || me.email;
        }
      } catch { /* ignore */ }
      await loadDecks();
    }

    // --- Deck grid ---
    async function loadDecks() {
      const content = document.getElementById('content');
      try {
        const data = await api('GET', '/admin/api/decks');
        if (!data.decks.length) {
          content.innerHTML = `
            <div class="empty">
              <h2>No decks yet</h2>
              <p>Deploy a deck to see it here. Users will appear after seeding.</p>
            </div>`;
          return;
        }
        content.innerHTML = '<div class="grid">' + data.decks.map(d => `
          <div class="card">
            <div class="card-label">${escapeHtml(d.slug)}</div>
            <div class="card-meta">${d.userCount} user${d.userCount !== 1 ? 's' : ''}</div>
            <button onclick="openDeck('${escapeHtml(d.slug)}')">Manage Users</button>
          </div>
        `).join('') + '</div>';
      } catch (e) {
        content.innerHTML = `<div class="empty"><p>Failed to load decks: ${escapeHtml(e.message)}</p></div>`;
      }
    }

    // --- Modal ---
    async function openDeck(slug) {
      activeDeck = slug;
      document.getElementById('modalTitle').textContent = slug;
      document.getElementById('singleEmail').value = '';
      document.getElementById('bulkEmails').value = '';
      document.getElementById('userOverlay').classList.add('open');
      await loadDeckUsers();
    }

    function closeModal() {
      document.getElementById('userOverlay').classList.remove('open');
      activeDeck = null;
      loadDecks();
    }

    async function loadDeckUsers() {
      if (!activeDeck) return;
      const data = await api('GET', `/admin/api/decks/${activeDeck}`);
      const list = document.getElementById('modalUserList');
      const count = document.getElementById('modalUserCount');
      count.textContent = data.users.length + ' user' + (data.users.length !== 1 ? 's' : '');
      list.innerHTML = data.users.map(email => `
        <li class="user-item">
          <span class="user-email">${escapeHtml(email)}</span>
          <button class="btn-danger" onclick="removeUser('${escapeHtml(email)}')">Remove</button>
        </li>
      `).join('') || '<li style="color:#64748b;padding:10px 0;font-size:13px;">No users yet</li>';
    }

    // --- Actions ---
    async function addSingle() {
      const input = document.getElementById('singleEmail');
      const email = input.value.trim();
      if (!email) return;
      try {
        const data = await api('POST', `/admin/api/decks/${activeDeck}`, { emails: [email] });
        if (data.added && data.added.length) showToast(`Added ${email}`);
        else showToast('Already exists');
        input.value = '';
        await loadDeckUsers();
      } catch (e) { showToast('Error: ' + e.message); }
    }

    async function addBulk() {
      const textarea = document.getElementById('bulkEmails');
      const emails = textarea.value.split(/[\n,]+/).map(e => e.trim()).filter(Boolean);
      if (!emails.length) return;
      try {
        const data = await api('POST', `/admin/api/decks/${activeDeck}`, { emails });
        if (data.added && data.added.length) showToast(`Added ${data.added.length} user${data.added.length > 1 ? 's' : ''}`);
        else showToast('No new users added');
        textarea.value = '';
        await loadDeckUsers();
      } catch (e) { showToast('Error: ' + e.message); }
    }

    async function removeUser(email) {
      try {
        await api('DELETE', `/admin/api/decks/${activeDeck}/${encodeURIComponent(email)}`);
        showToast(`Removed ${email}`);
        await loadDeckUsers();
      } catch (e) { showToast('Error: ' + e.message); }
    }

    init();
  </script>
</body>
</html>
